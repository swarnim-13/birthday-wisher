<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Automatic Smart Alumani Birthday Wisher🎉</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>IPSA Group of Educational Institutes</h2>
    <h3>Automatic Smart Alumani Birthday Wisher </h3>
    <p>Select a date to see who’s celebrating 🎉</p>

    <!-- 🔍 Find Birthday (Year hidden, placeholder works) -->
    <div class="date-wrapper">
      <input type="date" id="datePicker" class="search-date" required>
      <label for="datePicker" class="date-placeholder">
        ADD date from calendar
      </label>
    </div>

    <button onclick="showBirthdays()">Show Birthdays</button>

    <!-- Cards -->
    <div id="cards" class="cards"></div>

    <!-- Divider -->
    <hr class="divider">

    <!-- ➕ Add Birthday -->
    <h2>➕ Add Student's Birthday</h2>

    <input type="text" id="nameInput" placeholder=" Name">
    <input type="text" id="courseInput" placeholder=" Degree">
    <input type="email" id="emailInput" placeholder=" student Email And Birthdate below" >
    <input type="date" id="birthdateInput" class="add-date" placeholder="Enter BIrth date">

    <button onclick="addBirthday()">Add Birthday</button>

    <p id="message"></p>
